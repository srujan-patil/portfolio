name: Deploy to E2E Cloud Kubernetes

on:
  workflow_run:
    workflows: ["CI — Test + Scan + Build"]
    types: [completed]
    branches: [main]

jobs:

  # ── Deploy to Staging first ─────────────────────────────────────
  deploy-staging:
    name: 🧪 Deploy → Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: staging

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig (E2E Cloud)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_E2E }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl get nodes

      - name: Deploy to staging namespace
        run: |
          kubectl set image deployment/portfolio \
            portfolio=ghcr.io/${{ github.repository }}:${{ github.event.workflow_run.head_sha }} \
            -n staging

      - name: Wait for staging rollout
        run: |
          kubectl rollout status deployment/portfolio \
            -n staging --timeout=90s

      - name: Staging health check
        run: |
          STAGING_IP=$(kubectl get svc portfolio-svc -n staging \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          sleep 10
          curl -f http://$STAGING_IP/health || exit 1
          echo "✅ Staging healthy at $STAGING_IP"

  # ── Deploy to Production after staging passes ──────────────────
  deploy-production:
    name: 🚀 Deploy → Production (E2E K8s)
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://your-domain.com

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig (E2E Cloud)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_E2E }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy new image to production
        run: |
          kubectl set image deployment/portfolio \
            portfolio=ghcr.io/${{ github.repository }}:${{ github.event.workflow_run.head_sha }} \
            -n production

      - name: Wait for production rollout (zero downtime)
        run: |
          kubectl rollout status deployment/portfolio \
            -n production --timeout=120s

      - name: Production health check
        run: |
          PROD_IP=$(kubectl get svc portfolio-svc -n production \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$PROD_IP/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check FAILED (HTTP $STATUS) — rolling back!"
            kubectl rollout undo deployment/portfolio -n production
            exit 1
          fi
          echo "✅ Production deployed successfully — SHA: ${{ github.event.workflow_run.head_sha }}"
          kubectl get pods -n production
