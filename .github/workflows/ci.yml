name: Ci/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Set up nodejs
        uses: actions/setup-node@v2
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test

  test-on-server:
    name: build and test on server
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: ssh into server and run tests
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/portfolio
            echo "--- Pulling latest code ---"
            git pull origin main
            echo "--- Building Docker image ---"
            docker build --target production -t portfolio:latest .
            echo " ----running container and running tests---"
            docker stop portfolio-test 2>/dev/null || true
            docker rm portfolio-test 2>/dev/null || true
            docker run -d \ 
              --name portfolio-test \
              -p 3000:3000 \
              -e NODE_ENV=test \
              portfolio:test

            echo "--- Waiting for the container to be healthy ---"
            STATUS= $(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)

            if [ "$STATUS" == 200]; then
              echo "container is healthy, running tests..."
              docker stop portfolio-test
              docker rm portfolio-test
            else
              echo "container is not healthy, stopping tests..."
              docker logs portfolio-test
              docker stop portfolio-test
              docker rm portfolio-test
              exit 1
            fi

  push-to-registry:
    name: push to registry
    runs-on: ubuntu-latest
    needs: test-on-server
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio:${{ github.sha }}
  update-manifest:
    name: 🚀 Update K8s Manifest
    runs-on: ubuntu-latest
    needs: push-to-dockerhub
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in deployment.yaml
        run: |
          sed -i "s|image:.*portfolio.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio:${{ github.sha }}|" k8s/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add k8s/deployment.yaml
          git commit -m "ci: update image to ${{ github.sha }}"
          git push
