name: CI — Test + Scan + Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Run tests ────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test

  # ── Job 2: Trivy security scan ─────────────────────────────────
  trivy-scan:
    name: 🔍 Trivy Security Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: docker build --target production -t scan:${{ github.sha }} .

      - name: Trivy — image scan (blocks on CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif

      - name: Trivy — filesystem + code scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-fs.sarif

      - name: Upload image scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Upload fs scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ── Job 3: Build & push Docker image ───────────────────────────
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, trivy-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
