apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: production
  labels:
    app: portfolio
  annotations:
    argocd-image-updater.argoproj.io/image-list: portfolio=srujanpanthula/portfolio
    argocd-image-updater.argoproj.io/update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: git

spec:
  replicas: 2

  selector:
    matchLabels:
      app: portfolio

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: portfolio

    spec:
      imagePullSecrets:
        - name: dockerhub-secret

      containers:
        - name: portfolio
          image: srujanpanthula/portfolio:latest
          imagePullPolicy: Always   # 🔥 IMPORTANT

          ports:
            - containerPort: 3000

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3