apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: production
  labels:
    app: portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0      # zero-downtime — never kill a pod before new one is ready
      maxSurge: 1            # spin up 1 extra pod during update
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      imagePullSecrets:
      - name: ghcr-secret    # created in Step 7 of the guide
      containers:
      - name: portfolio
        image: srujanpanthula/portfolio:d623fdb2bd541afe1d7b9b6b0de9f782b1318f17
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        # Liveness: K8s restarts the container if this fails
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 30
          failureThreshold: 3
        # Readiness: K8s only sends traffic when this passes
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
