---
# Staging deployment — same as production but namespace = staging
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: staging
  labels:
    app: portfolio
spec:
  replicas: 1           # staging only needs 1 replica
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: portfolio
        image: ghcr.io/YOUR_USERNAME/portfolio:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "staging"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-svc
  namespace: staging
spec:
  selector:
    app: portfolio
  ports:
  - port: 80
    targetPort: 3000
  type: LoadBalancer
